name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.16"
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync --locked --group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.12.2"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false -input=false
      - run: terraform validate

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend, terraform]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build --wait --wait-timeout 120
      - run: curl --fail --show-error http://localhost:8000/health/live/
      - run: curl --fail --show-error http://localhost:8000/health/ready/
      - run: curl --fail --show-error http://localhost:5173/
      - if: always()
        run: docker compose down --volumes --remove-orphans
