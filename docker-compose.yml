name: escrow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: escrow
      POSTGRES_USER: escrow
      POSTGRES_PASSWORD: escrow-local-only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d escrow"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: escrow
      RABBITMQ_DEFAULT_PASS: escrow-local-only
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  api:
    build:
      context: .
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: local-development-only-not-a-secret
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      DATABASE_URL: postgresql://escrow:escrow-local-only@postgres:5432/escrow
      RABBITMQ_URL: amqp://escrow:escrow-local-only@rabbitmq:5672/%2F
      REDIS_URL: redis://redis:6379/0
      HEALTHCHECK_TIMEOUT_SECONDS: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; assert urlopen('http://127.0.0.1:8000/health/live/', timeout=2).status == 200",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response) => { if (!response.ok) process.exit(1) })",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
  rabbitmq_data:
