name: escrow

x-runtime-environment: &runtime-environment
  DJANGO_DEBUG: "true"
  DJANGO_SECRET_KEY: local-development-only-not-a-secret
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
  DATABASE_URL: postgresql://escrow:escrow-local-only@postgres:5432/escrow
  RABBITMQ_URL: amqp://escrow:escrow-local-only@rabbitmq:5672/%2F
  REDIS_URL: redis://redis:6379/0
  HEALTHCHECK_TIMEOUT_SECONDS: "1"
  EMAIL_DELIVERY_BACKEND: ministack
  MINISTACK_ENDPOINT_URL: http://ministack:4566
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: "000000000000"
  AWS_SECRET_ACCESS_KEY: test
  SES_FROM_EMAIL: no-reply@escrow.local
  PII_ENCRYPTION_BACKEND: kms
  PII_KMS_KEY_ID: alias/escrow-local-application
  PII_BLIND_INDEX_SECRET: local-pii-blind-index-secret-change-me
  CHECKOUT_TOKEN_HMAC_SECRET: local-checkout-token-key-only
  AGREEMENT_IDEMPOTENCY_HMAC_SECRET: local-agreement-idempotency-hmac-key-only
  SANDBOX_PIX_CALLBACK_SIGNING_SECRET: local-sandbox-pix-callback-secret

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: escrow
      POSTGRES_USER: escrow
      POSTGRES_PASSWORD: escrow-local-only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d escrow"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: escrow
      RABBITMQ_DEFAULT_PASS: escrow-local-only
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  ministack:
    image: ministackorg/ministack:1.4.1
    environment:
      AWS_ACCESS_KEY_ID: "000000000000"
      AWS_SECRET_ACCESS_KEY: test
      MINISTACK_HOST: ministack
      MINISTACK_REGION: us-east-1
      MINISTACK_WORKER_THREADS: "8"
      PERSIST_STATE: "1"
      SERVICES: ses,secretsmanager,kms
      STATE_DIR: /tmp/ministack-state
    ports:
      - "4566:4566"
    volumes:
      - ministack_data:/tmp/ministack-state
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; assert urlopen('http://127.0.0.1:4566/_ministack/ready', timeout=2).status == 200",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  terraform:
    image: hashicorp/terraform:1.12.2
    working_dir: /workspace
    entrypoint:
      - sh
      - -ec
      - |
        terraform init -input=false
        terraform apply -auto-approve -input=false
    environment:
      TF_VAR_ministack_endpoint: http://ministack:4566
      TF_VAR_aws_access_key: "000000000000"
      TF_VAR_aws_secret_key: test
      TF_VAR_application_secret_values: >-
        {"DJANGO_SECRET_KEY":"local-development-only-not-a-secret","WEBHOOK_SIGNING_SECRET":"local-webhook-signing-secret","PII_BLIND_INDEX_SECRET":"local-pii-blind-index-secret-change-me","CHECKOUT_TOKEN_HMAC_SECRET":"local-checkout-token-key-only","AGREEMENT_IDEMPOTENCY_HMAC_SECRET":"local-agreement-idempotency-hmac-key-only"}
    command: []
    volumes:
      - ./terraform:/workspace
    depends_on:
      ministack:
        condition: service_healthy

  api:
    build:
      context: .
    environment: *runtime-environment
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ministack:
        condition: service_healthy
      terraform:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; assert urlopen('http://127.0.0.1:8000/health/live/', timeout=2).status == 200",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  outbox-publisher:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "celery", "-A", "escrow.celery:app", "worker", "--loglevel=INFO", "--concurrency=1", "--hostname=outbox@%h", "--queues=messaging.outbox"]
    environment: *runtime-environment
    depends_on:
      api:
        condition: service_healthy

  risk-worker:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "celery", "-A", "escrow.celery:app", "worker", "--loglevel=INFO", "--concurrency=1", "--hostname=risk@%h", "--queues=risk.funding,risk.dispute"]
    environment: *runtime-environment
    depends_on:
      api:
        condition: service_healthy

  ledger-worker:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "celery", "-A", "escrow.celery:app", "worker", "--loglevel=INFO", "--concurrency=1", "--hostname=ledger@%h", "--queues=ledger.funding,ledger.release,ledger.refund"]
    environment: *runtime-environment
    depends_on:
      api:
        condition: service_healthy

  notifications-worker:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "celery", "-A", "escrow.celery:app", "worker", "--loglevel=INFO", "--concurrency=1", "--hostname=notifications@%h", "--queues=notifications.realtime,notifications.webhook"]
    environment: *runtime-environment
    depends_on:
      api:
        condition: service_healthy

  celery-beat:
    build:
      context: .
    command:
      ["uv", "run", "--no-sync", "celery", "-A", "escrow.celery:app", "beat", "--loglevel=INFO", "--schedule=/tmp/celerybeat-schedule"]
    environment: *runtime-environment
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response) => { if (!response.ok) process.exit(1) })",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
  rabbitmq_data:
  ministack_data:
